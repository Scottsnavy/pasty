<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#0f0f0f;color:#fff;overflow-x:hidden}
#menu-toggle{display:none}

/* NAV */
.nav{
 position:fixed;top:0;left:0;width:100%;
 display:flex;justify-content:space-between;align-items:center;
 padding:16px 20px;background:rgba(0,0,0,.6);
 backdrop-filter:blur(8px);z-index:10
}
.logo{font-family:Playfair Display,serif}
.menu-btn{font-size:26px;cursor:pointer}

/* SIDEBAR */
.sidebar{
 position:fixed;top:0;left:-260px;width:260px;height:100%;
 padding:80px 20px;background:#111;transition:.4s;z-index:9
}
.sidebar a{display:block;margin:20px 0;color:#fff;text-decoration:none;opacity:.8}
#menu-toggle:checked~.sidebar{left:0}

/* OVERLAY */
.overlay{
 position:fixed;inset:0;background:rgba(0,0,0,.5);
 opacity:0;pointer-events:none;transition:.3s;z-index:8
}
#menu-toggle:checked~.overlay{opacity:1;pointer-events:auto}

/* HERO */
.hero{
 height:100vh;min-height:100svh;
 display:flex;align-items:center;justify-content:center;
 text-align:center;padding-top:60px;overflow:hidden;position:relative
}

/* SLIDES */
.slides{position:absolute;inset:0}
.slides img{
 position:absolute;top:0;left:0;
 width:100vw;height:100vh;
 object-fit:cover;object-position:center;
 opacity:0;animation:kb 18s infinite
}
.slides img:nth-child(1){animation-delay:0s}
.slides img:nth-child(2){animation-delay:6s}
.slides img:nth-child(3){animation-delay:12s}

/* OVERLAY */
.hero::after{
 content:"";position:absolute;inset:0;
 background:linear-gradient(135deg,#000,rgba(0,0,0,.4))
}

/* TEXT */
.hero-content{position:relative;z-index:2}
.hero h1{
 font-family:Playfair Display,serif;
 font-size:3rem;margin-bottom:10px
}
.hero p{opacity:.85;margin-bottom:20px}

/* BTN */
.btn{
 padding:12px 26px;
 background:linear-gradient(45deg,#c59d5f,#e6c27a);
 color:#000;text-decoration:none
}

/* ANIMATION */
@keyframes kb{
 0%{opacity:0;transform:scale(1)}
 10%{opacity:1}
 40%{opacity:1}
 50%{opacity:0}
 100%{opacity:0;transform:scale(1.15)}
}
</style>
</head>

<body>

<input type="checkbox" id="menu-toggle">

<div class="nav">
 <div class="logo">LOGO</div>
 <label for="menu-toggle" class="menu-btn">☰</label>
</div>

<div class="sidebar">
 <label for="menu-toggle">✕ Close</label>
 <a href="#">Menu</a>
 <a href="#">About</a>
 <a href="#">Location</a>
</div>

<label for="menu-toggle" class="overlay"></label>

<section class="hero">

 <div class="slides">
  <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
  <img src="https://images.unsplash.com/photo-1559847844-d721426d6edc">
  <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe">
 </div>

 <div class="hero-content">
  <h1>Restaurant Name</h1>
  <p>Bold flavor. Clean design.</p>
  <a href="#" class="btn">View Menu</a>
 </div>

</section>

</body>
</html>
